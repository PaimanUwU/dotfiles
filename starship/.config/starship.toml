add_newline = true
palette = 'catppuccin_mocha'

# unuse component:
# $shell\ 
# $directory\
# $fish_indicator\

format = """
$git_branch\
$git_status\
$php\
$laravel\
$python\
$lua\
$nodejs\
$golang\
$rust\
$docker_context\
$jobs\
$cmd_duration\
$line_break\
$character"""

[line_break]
disabled = true

[character]
success_symbol = "[ ❯](bold fg:green)"
error_symbol = "[ ❯](bold fg:red)"
vimcmd_symbol = "[ ❮](bold fg:mauve)"

[directory]
style = 'bold fg:blue'
format = '[$path ]($style)'
truncation_length = 3    # Increased slightly so you can see where you are
truncation_symbol = '…/'
truncate_to_repo = true  # This stops it from showing long paths outside your project
fish_style_pwd_dir_length = 1 # Makes parent dirs just one letter if space is tight

[directory.substitutions]
'Documents' = '󰈙'
'Downloads' = ' '
'Music' = ' '
'Pictures' = ' '
'Dotfiles' = '⚙️'

[git_branch]
style = 'fg:mauve'
symbol = ' '
format = '(fg:subtext0) [$symbol$branch ]($style)'

[git_status]
style = 'fg:red'
format = '([$all_status$ahead_behind]($style) )'

[php]
symbol = " "
style = "fg:sky"

[python]
style = 'fg:teal'
symbol = ' '
format = '[${symbol}${pyenv_prefix}(${version} )(\($virtualenv\) )]($style)'

[lua]
symbol = ' '
style = 'fg:blue'

[nodejs]
style = 'fg:green'
symbol = ' '

[golang]
style = 'fg:sky'
symbol = ' '

[rust]
style = 'fg:peach'
symbol = ' '

[docker_context]
symbol = ' '
style = 'fg:blue'
format = '[$symbol]($style) $path'

[jobs]
symbol = ' '
style = 'fg:red'
number_threshold = 1

[cmd_duration]
min_time = 500
style = 'fg:surface2'
format = '[$duration]($style)'

[shell]
disabled = false
fish_indicator = '' 
zsh_indicator = '󱆃 '       # If you ever go back
bash_indicator = ' '
style = 'bold fg:mauve'
format = '[$indicator ]($style)'

[palettes.catppuccin_mocha]
rosewater = "#f5e0dc"
flamingo = "#f2cdcd"
pink = "#f5c2e7"
mauve = "#cba6f7"
red = "#f38ba8"
maroon = "#eba0ac"
peach = "#fab387"
yellow = "#f9e2af"
green = "#a6e3a1"
teal = "#94e2d5"
sky = "#89dceb"
sapphire = "#74c7ec"
blue = "#89b4fa"
lavender = "#b4befe"
text = "#cdd6f4"
subtext1 = "#bac2de"
subtext0 = "#a6adc8"
overlay2 = "#9399b2"
overlay1 = "#7f849c"
overlay0 = "#6c7086"
surface2 = "#585b70"
surface1 = "#45475a"
surface0 = "#313244"
base = "#1e1e2e"
mantle = "#181825"
crust = "#11111b"
