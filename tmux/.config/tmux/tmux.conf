# ================================================================================== 
# 1. Terminal, Ghostty Support and General Settings
# ==================================================================================
set -g default-terminal "tmux-256color"
set -as terminal-overrides ',xterm-ghostty:kitg'
set-option -sa terminal-overrides ",xterm*:Tc"
set -g mouse on
set-window-option -g mode-keys vi
set-window-option -g clock-mode-style 12

# Force bar cursor on startup and new panes
set -g terminal-overrides ',xterm*:Ss=\E[%p1%d q:Se=\E[5 q'
set -ga terminal-overrides '*:Ss=\E[%p1%d q:Se=\E[5 q'

# Enable cursor shape changes (DECSCUSR)
set -g terminal-overrides ',xterm*:Cr=\E]12;gray\a'
set -ga terminal-overrides '*:Ss=\E[%p1%d q:Se=\E[2 q'

# Yazi Image Preview Support
set -g allow-passthrough on
set -ga update-environment TERM
set -ga update-environment TERM_PROGRAM


# ================================================================================== 
# 2. Plugins List
# ==================================================================================
set -g @plugin 'tmux-plugins/tmux-sensible'
set -g @plugin 'christoomey/vim-tmux-navigator'
set -g @plugin 'catppuccin/tmux'
set -g @plugin 'tmux-plugins/tmux-yank'
set -g @plugin 'tmux-plugins/tpm'
set -g @plugin 'tmux-plugins/tmux-resurrect'
set -g @plugin 'tmux-plugins/tmux-continuum'
set -g @plugin 'fcsonline/tmux-thumbs'
set -g @plugin 'sainnhe/tmux-fzf'
set -g @plugin 'wfxr/tmux-fzf-url'
set -g @plugin 'omerxx/tmux-sessionx'
set -g @plugin 'omerxx/tmux-floax'
set -g @plugin 'tmux-plugins/tmux-cpu'

# run '#{TMUX_PLUGIN_MANAGER_PATH}/tmux/catppuccin.tmux'


# ================================================================================== 
# 3. Pluggin Configuration
# ==================================================================================
set -g @catppuccin_pane_status_enabled "off"
set -g @catppuccin_pane_border_status "top"
set -g @catppuccin_flavor 'mocha'
set -g @catppuccin_status_background "none" # Makes the bar transparent
set -g @catppuccin_window_status_style "none"
#set -g @catppuccin_status_left_separator  ""
#set -g @catppuccin_status_right_separator ""
set -g @catppuccin_session_status_style "rect"
set -g @catppuccin_status_left_separator  "█"
set -g @catppuccin_status_right_separator "█"
set -g @catppuccin_status_connect_separator "yes"
set -g @catppuccin_status_fill "all"
set -g @catppuccin_date_time_text ' %d.%m. %H:%M'

set -g @floax-width '80%'
set -g @floax-height '80%'
set -g @floax-border-color 'magenta'
set -g @floax-text-color 'blue'
set -g @floax-change-path 'true'

set -g @sessionx-bind-zo-new-window ''
set -g @sessionx-auto-accept 'off'
set -g @sessionx-custom-paths '~/Documents/Dotfiles'
set -g @sessionx-x-path '~/Documents/Dotfiles'
set -g @sessionx-window-height '60%'
set -g @sessionx-window-width '50%'
set -g @sessionx-zoxide-mode 'on'
set -g @sessionx-custom-paths-subdirectories 'false'
set -g @sessionx-filter-current 'false'
set -g @sessionx-tree-mode 'off'
set -g @sessionx-preview-location 'right'
set -g @sessionx-preview-ratio '55%'
set -g @sessionx-additional-options "--color pointer:9,spinner:92,marker:46"
set -g @sessionx-fzf-opts '--color=border:#{E:@thm_blue}'
set -g @sessionx-zoxide-mode 'on'

set -g @continuum-restore 'on'

set -g @catppuccin_git_icon "󰊢 "
set -g @catppuccin_git_color "#{@thm_blue}"
set -g @catppuccin_git_text " #(cd #{pane_current_path}; git rev-parse --abbrev-ref HEAD 2>/dev/null || echo 'N/A')"

set -g @catppuccin_coffee_icon "󰅶 "
set -g @catppuccin_coffee_color "#{@thm_peach}"
set -g @catppuccin_coffee_text " Coding... "


# ================================================================================== 
# 4. Load Plugin & Modules
# ==================================================================================

# Load custom modules (Ensure these paths exist in ~/.config/tmux/custom_modules/)
# source -F '#{d:current_file}/custom_modules/ctp_cpu.conf'
# source -F '#{d:current_file}/custom_modules/ctp_memory.conf'
# source -F '#{d:current_file}/custom_modules/primary_ip.conf'


# ================================================================================== 
# 5. Status Bar Layout
# ==================================================================================
set -g status-position top
set -g status-interval 5
set -g status-justify "absolute-centre"
set -g status-style "bg=default" # Transparent background

# Pane
set -g pane-border-status top
set -g pane-border-format "#[bg=default,fg=#{@thm_blue}] #P #{pane_current_command} "

# Left Side 
set -g status-left-length 100
set -g status-left "#{E:@catppuccin_status_session}"
set -ga status-left "#[bg=default,fg=#{@thm_maroon}]  #{pane_current_command} "
set -ga status-left "#[bg=default,fg=#{@thm_overlay_0},none]│"
# Shows as much of the path as possible within 32 chars, cutting from the left
set -ga status-left "#[bg=default,fg=#{@thm_blue}]  #{=/-32/...:#{s|$USER|~|:pane_current_path}} "
set -ga status-left "#[bg=#{@thm_bg},fg=#{@thm_overlay_0}, none]│"

# Right Side 
set -g status-right-length 100
set -g status-right "#[bg=#{@thm_bg},fg=#{@thm_overlay_0}, none]│"
set -ga status-right "#[fg=#{@thm_overlay_0}]#[fg=#{@thm_maroon}]  #{cpu_percentage} "
set -ga status-right "#[fg=#{@thm_overlay_0}]│#[fg=#{@thm_sky}]  #{ram_percentage} "
set -ga status-right "#[bg=#{@thm_bg},fg=#{@thm_overlay_0}, none]│"
set -ga status-right "#[bg=#{@thm_bg},fg=#{@thm_blue}] 󰭦 %Y-%m-%d  󰅐 %H:%M"

# Window
set -g window-status-current-style "none"
set -g window-status-style "bg=#{@thm_bg},fg=#{@thm_rosewater}" 
set -wg automatic-rename on
set -g status-justify "absolute-centre"
set-option -g automatic-rename on
set-option -g automatic-rename-format '#{pane_current_command}'
set-option -g status-interval 1
set -g window-status-separator "" # Remove the default space between windows
set -g window-status-format " #I#{?window_activity_flag,#[fg=#{@thm_red}] 󱅫 ,: #W} "
set -g window-status-style "bg=#{@thm_bg},fg=#{@thm_rosewater}"
set -g window-status-last-style "bg=#{@thm_bg},fg=#{@thm_peach}"
set -g window-status-current-format "#[fg=#{@thm_peach},bg=#{@thm_bg}]█#[fg=#{@thm_bg},bg=#{@thm_peach},bold] #I#{?#{!=:#{window_name},Window},: #W,} #[fg=#{@thm_peach},bg=#{@thm_bg}]█"
set -g window-status-current-style "bg=#{@thm_peach},fg=#{@thm_bg},bold"


# ================================================================================== 
# 6. keybindings
# ==================================================================================
unbind C-b
unbind s
unbind d
unbind r
unbind f
unbind S
unbind c
unbind w
unbind t

# Prefix
set -g prefix C-Space
bind C-Space send-prefix

 # Exit/detach temux
bind e detach-client

# Reload config
bind r source-file ~/.config/tmux/tmux.conf \; display-message "Config reloaded! >w<"

# Vim style pane selection
bind h select-pane -L
bind j select-pane -D
bind k select-pane -U
bind l select-pane -R

# Resize panes (Repeatable with -r)
bind -r H resize-pane -L 30
bind -r J resize-pane -D 5
bind -r K resize-pane -U 5
bind -r L resize-pane -R 30

# Start windows and panes at 1
set -g base-index 1
set -g pane-base-index 1
set-window-option -g pane-base-index 1
set-option -g renumber-windows on

# Window navigation
bind -r p previous-window
bind -r n next-window

# Splits
bind 'D' split-window -v -c "#{pane_current_path}" 
bind 'd' split-window -h -c "#{pane_current_path}" 

# Session
set -g @sessionx-bind 's'
bind S command-prompt -p "New Session Name:" "new-session -A -s '%%'" \; display-message 'Session created! >w<'

# Vim style visual mode
bind-key -T copy-mode-vi v send-keys -X begin-selection
bind-key -T copy-mode-vi V send-keys -X select-line # Optional: line-wise selection
bind-key -T copy-mode-vi C-v send-keys -X rectangle-toggle # Optional: block-wise selection
bind-key -T copy-mode-vi y send-keys -X copy-selection-and-cancel

# Window management
bind W command-prompt -p "Window Name:" "new-window -c '#{pane_current_path}' -n '%%'" 
bind w new-window -c "#{pane_current_path}"
bind T choose-tree -Zw
bind X confirm-before -p "Kill window #W? (y/n)" "kill-window" \; display-message 'Window killed! >w<'

# Mini terminal
bind t split-window -v -l 8 -c "#{pane_current_path}"

# Open the clock in 12-hour format
bind - clock-mode

# Exit copy-mode (caret mode) with Escape
bind c copy-mode
bind-key -T copy-mode-vi Escape send-keys -X cancel

# Open floax
set -g @floax-bind 'f'


# ================================================================================== 
# 7. Finalize
# ==================================================================================
# Initialize TPM (Keep this at the very bottom)
run '~/.tmux/plugins/tpm/tpm'
