# ================================================================================== 
# 1. Terminal & Ghostty Support
# ==================================================================================
set -g default-terminal "tmux-256color"
set -as terminal-overrides ',xterm-ghostty:kitg'
set-option -sa terminal-overrides ",xterm*:Tc"
set -g mouse on

# Yazi Image Preview Support
set -g allow-passthrough on
set -ga update-environment TERM
set -ga update-environment TERM_PROGRAM


# ================================================================================== 
# 2. Plugins List
# ==================================================================================
set -g @plugin 'tmux-plugins/tmux-sensible'
set -g @plugin 'christoomey/vim-tmux-navigator'
set -g @plugin 'catppuccin/tmux#v2.1.3'
set -g @plugin 'tmux-plugins/tmux-yank'
set -g @plugin 'tmux-plugins/tpm'


# ================================================================================== 
# 3. Catppuccin Configuration
# ==================================================================================
set -g @catppuccin_pane_status_enabled "off"
set -g @catppuccin_pane_border_status "top"
set -g @catppuccin_flavor 'mocha'
set -g @catppuccin_status_background "none" # Makes the bar transparent
set -g @catppuccin_window_status_style "none"
set -g @catppuccin_status_left_separator  ""
set -g @catppuccin_status_right_separator ""
set -g @catppuccin_status_fill "icon"
set -g @catppuccin_status_connect_separator "no"

# ================================================================================== 
# 4. Load Plugin & Modules
# ==================================================================================
run '#{TMUX_PLUGIN_MANAGER_PATH}/tmux/catppuccin.tmux'

# Load custom modules (Ensure these paths exist in ~/.config/tmux/custom_modules/)
source -F '#{d:current_file}/custom_modules/ctp_cpu.conf'
source -F '#{d:current_file}/custom_modules/ctp_memory.conf'
source -F '#{d:current_file}/custom_modules/primary_ip.conf'


# ================================================================================== 
# 5. Status Bar Layout
# ==================================================================================
set -g status-position top
set -g status-interval 5
set -g status-justify "absolute-centre"
set -g status-style "bg=default" # Transparent background

# Pane
set -g pane-border-status top
set -g pane-border-format "#[bg=default,fg=#{@thm_blue}] #P #{pane_current_command} "

# Left Side 
set -g status-left-length 100
set -g status-left "#{E:@catppuccin_status_session}"
set -ga status-left "#[bg=default,fg=#{@thm_maroon}]  #{pane_current_command} "
set -ga status-left "#[bg=default,fg=#{@thm_overlay_0},none]│"
# Shows as much of the path as possible within 32 chars, cutting from the left
set -ga status-left "#[bg=default,fg=#{@thm_blue}]  #{=/-32/...:#{s|$USER|~|:pane_current_path}} "

# Right Side 
set -g status-right-length 100
set -g status-right "#{E:@catppuccin_status_uptime}"
set -ag status-right "#{E:@catppuccin_status_date_time}"

# Window
set -g window-status-current-style "none"
set -g window-status-style "bg=#{@thm_bg},fg=#{@thm_rosewater}" 
set -wg automatic-rename on
set -g status-justify "absolute-centre"
set-option -g automatic-rename on
set-option -g automatic-rename-format '#{pane_current_command}'
set-option -g status-interval 1
set -g window-status-separator "" # Remove the default space between windows
set -g window-status-format "  #I#{?#{!=:#{window_name},Window},: #W,}  "
set -g window-status-style "bg=#{@thm_bg},fg=#{@thm_rosewater}"
set -g window-status-last-style "bg=#{@thm_bg},fg=#{@thm_peach}"
set -g window-status-current-format "#[fg=#{@thm_peach},bg=#{@thm_bg}]#[fg=#{@thm_bg},bg=#{@thm_peach},bold] #I#{?#{!=:#{window_name},Window},: #W,} #[fg=#{@thm_peach},bg=#{@thm_bg}]"
set -g window-status-current-style "bg=#{@thm_peach},fg=#{@thm_bg},bold"


# ================================================================================== 
# 6. keybindings & general settings
# ==================================================================================
set -g prefix C-t
unbind C-b
bind C-t send-prefix

unbind d
bind e detach-client

# Reload config
unbind r
bind r source-file ~/.config/tmux/tmux.conf \; display-message "Config reloaded!"

# Vim style pane selection
bind h select-pane -L
bind j select-pane -D
bind k select-pane -U
bind l select-pane -R

# Resize panes (Repeatable with -r)
bind -r H resize-pane -L 30
bind -r J resize-pane -D 5
bind -r K resize-pane -U 5
bind -r L resize-pane -R 30

# Start windows and panes at 1
set -g base-index 1
set -g pane-base-index 1
set-window-option -g pane-base-index 1
set-option -g renumber-windows on

# Window navigation
bind -n M-H previous-window
bind -n M-L next-window

# Splits
bind 'D' split-window -v -c "#{pane_current_path}"
bind 'd' split-window -h -c "#{pane_current_path}"


# ================================================================================== 
# 7. Finalize
# ==================================================================================
# Initialize TPM (Keep this at the very bottom)
run '~/.tmux/plugins/tpm/tpm'
