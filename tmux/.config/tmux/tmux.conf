# ================================================================================== 
# 1. Terminal, Ghostty Support and General Settings
# ==================================================================================
set -g default-terminal "tmux-256color"
set -as terminal-overrides ',xterm-ghostty:kitg'
set-option -sa terminal-overrides ",xterm*:Tc"
set -g mouse on
set-window-option -g mode-keys vi
set-window-option -g clock-mode-style 12

# Force bar cursor on startup and new panes
set -g terminal-overrides ',xterm*:Ss=\E[%p1%d q:Se=\E[5 q'
set -ga terminal-overrides '*:Ss=\E[%p1%d q:Se=\E[5 q'

# Enable cursor shape changes (DECSCUSR)
set -g terminal-overrides ',xterm*:Cr=\E]12;gray\a'
set -ga terminal-overrides '*:Ss=\E[%p1%d q:Se=\E[2 q'

# Yazi Image Preview Support
set -g allow-passthrough on
set -ga update-environment TERM
set -ga update-environment TERM_PROGRAM

# ================================================================================== 
# 2. Plugins List
# ==================================================================================
set -g @plugin 'tmux-plugins/tpm'
set -g @plugin 'tmux-plugins/tmux-sensible'
set -g @plugin 'christoomey/vim-tmux-navigator'
set -g @plugin 'catppuccin/tmux'
set -g @plugin 'tmux-plugins/tmux-yank'
set -g @plugin 'tmux-plugins/tmux-resurrect'
set -g @plugin 'tmux-plugins/tmux-continuum'
set -g @plugin 'fcsonline/tmux-thumbs'
set -g @plugin 'sainnhe/tmux-fzf'
set -g @plugin 'wfxr/tmux-fzf-url'
set -g @plugin 'omerxx/tmux-sessionx'
set -g @plugin 'omerxx/tmux-floax'
set -g @plugin 'tmux-plugins/tmux-cpu'

# ================================================================================== 
# 3. Plugin Configuration
# ==================================================================================
set -g @catppuccin_flavor 'mocha'
set -g @catppuccin_status_background "none"
set -g @catppuccin_window_status_style "none"
set -g @catppuccin_pane_status_enabled "off"
set -g @catppuccin_pane_border_status "off"

# NvStatusline style variables
set -g @catppuccin_status_left_separator  "█"
set -g @catppuccin_status_right_separator "█"
set -g @catppuccin_status_connect_separator "no"
set -g @catppuccin_status_fill "icon"

set -g @floax-width '80%'
set -g @floax-height '80%'
set -g @floax-border-color 'magenta'
set -g @floax-text-color 'blue'
set -g @floax-change-path 'true'

set -g @sessionx-custom-paths '~/Documents/Dotfiles'
set -g @sessionx-zoxide-mode 'on'
set -g @sessionx-window-height '60%'
set -g @sessionx-window-width '50%'

set -g @continuum-restore 'on'


# ================================================================================== 
# 4. Status Bar Layout (NvStatusline Aesthetic)
# ==================================================================================
set -g status-position top
set -g status-interval 5
set -g status-justify "absolute-centre"
set -g status-style "bg=#232232"

# --- Left Side ---
set -g status-left-length 100
set -g status-left "#{?client_prefix,#[fg=#{@thm_bg}]#[bg=#{@thm_red}]#[bold]  #S ,#[fg=#{@thm_bg}]#[bg=#8CC1F0]#[bold]  #S }"
set -ga status-left "#[fg=#474656,bg=#232232]█"
set -ga status-left "#[fg=#{@thm_fg},bg=#{@thm_surface_0}]  #[fg=#{@thm_fg},bg=#{@thm_surface_0},bold] #{pane_current_command}"
set -ga status-left "#[fg=#{@thm_surface_0},bg=#232232]█"
set -ga status-left "#[fg=#737184,bg=#232232] #[fg=#737184,bg=#232232,bold] #(cd #{pane_current_path}; git rev-parse --abbrev-ref HEAD 2>/dev/null || echo 'None') "
set -ga status-left "#[fg=#737184,bg=#232232]  #[fg=#737184,bg=#232232,bold]#{=/-32/...:#{s|$USER|~|:pane_current_path}} "

# --- Right Side ---
set -g status-right-length 100
set -g status-right "#[fg=#{@thm_bg},bg=#{@thm_pink}]  #[fg=#{@thm_fg},bg=#2F2E3E] #{cpu_percentage}  "
set -ga status-right "#[fg=#{@thm_bg},bg=#{@thm_sky}]  #[fg=#{@thm_fg},bg=#2F2E3E] #{ram_percentage}  "
set -ga status-right "#[fg=#{@thm_bg},bg=#{@thm_lavender}] 󰭦 #[fg=#{@thm_lavender},bg=#2F2E3E] %d.%m. 󰅐 %H:%M "

# --- Window (Center) ---
set -g window-status-separator ""
set -g window-status-format "#[fg=#232232,bg=#232232]█#[fg=#{@thm_rosewater},bg=#232232]#I: #W#[fg=#232232,bg=#232232]█"
set -g window-status-current-format "#[fg=#232232,bg=#232232]█#[fg=#{@thm_peach},bg=#232232]█#[fg=#{@thm_bg},bg=#{@thm_peach},bold] #I: #W #[fg=#{@thm_peach},bg=#232232]█#[fg=#232232,bg=#232232]█"

# ================================================================================== 
# 5. Keybindings
# ==================================================================================
unbind C-b
set -g prefix C-Space
bind C-Space send-prefix

bind e detach-client
bind r source-file ~/.config/tmux/tmux.conf \; display-message "Config reloaded! >w<"

# Selection & Panes
set -g base-index 1
set -g pane-base-index 1
set-window-option -g pane-base-index 1
set-option -g renumber-windows on

bind h select-pane -L
bind j select-pane -D
bind k select-pane -U
bind l select-pane -R

bind -r H resize-pane -L 30
bind -r J resize-pane -D 5
bind -r K resize-pane -U 5
bind -r L resize-pane -R 30

bind 'D' split-window -v -c "#{pane_current_path}" 
bind 'd' split-window -h -c "#{pane_current_path}" 

# Window navigation
bind -r p previous-window
bind -r n next-window
bind W command-prompt -p "Window Name:" "new-window -c '#{pane_current_path}' -n '%%'" 
bind w new-window -c "#{pane_current_path}"
bind X confirm-before -p "Kill window #W? (y/n)" "kill-window"

# Copy mode
bind-key -T copy-mode-vi v send-keys -X begin-selection
bind-key -T copy-mode-vi y send-keys -X copy-selection-and-cancel
bind c copy-mode
bind-key -T copy-mode-vi Escape send-keys -X cancel

# Plugin binds
set -g @sessionx-bind 's'
set -g @floax-bind 'f'
bind t split-window -v -l 8 -c "#{pane_current_path}"

# ================================================================================== 
# 6. Finalize
# ==================================================================================
run '~/.tmux/plugins/tpm/tpm'

# Force the background color AFTER TPM loads the theme
set -g status-style "bg=#232232"
